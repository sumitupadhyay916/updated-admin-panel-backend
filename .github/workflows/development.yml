name: Backend Deployment

on:
  push:
    branches:
      - develop-master-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@v1.1.0

        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true

          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 22 || true

            echo "Go to project folder..."
            cd /home/hireacoder-innoradeapi/htdocs/innoradeapi.hireacoder.in || exit 1

            echo "Pull latest code..."
            git fetch origin develop-master-backend
            git reset --hard origin/develop-master-backend
            git clean -fd

            echo "Install dependencies..."
            npm install --omit=dev

            echo "Run Prisma generate..."
            npx prisma generate

            echo "Run Prisma migrations..."
            npx prisma migrate deploy

            echo "Restart PM2..."
            PM2=/home/hireacoder-innoradeapi/.nvm/versions/node/v22.22.1/bin/pm2
            if $PM2 describe my-app >/dev/null 2>&1; then
              $PM2 restart my-app
            else
              $PM2 start src/server.js --name my-app
            fi

            $PM2 save
